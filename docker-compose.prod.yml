version: '3.9'

# Production Docker Compose
# Dijalankan di VPS 76.13.23.42
# Traefik sebagai reverse proxy sudah running di host

services:
  # ── PostgreSQL 16 ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: attendenx_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: Asia/Makassar
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME} -d ${DB_NAME}']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - attendenx_network

  # ── Redis 7 ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: attendenx_redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 300 100
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - attendenx_network

  # ── Backend (NestJS) ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: attendenx_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      TZ: Asia/Makassar

      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSL: false

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      BCRYPT_ROUNDS: 12

      # CORS + Cookie
      WEB_URL: https://${DOMAIN}

      # Cloudflare R2 (Storage)
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}

      # Firebase FCM
      FCM_PROJECT_ID: ${FCM_PROJECT_ID}
      FCM_CLIENT_EMAIL: ${FCM_CLIENT_EMAIL}
      FCM_PRIVATE_KEY: ${FCM_PRIVATE_KEY}

      # Resend (Email)
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      RESEND_FROM_NAME: ${RESEND_FROM_NAME}

      # WhatsApp
      WA_PHONE_NUMBER: ${WA_PHONE_NUMBER}
      WA_SESSION_PATH: /app/backend/wa-session

      # Geocoding
      NOMINATIM_BASE_URL: https://nominatim.openstreetmap.org
      NOMINATIM_USER_AGENT: ${NOMINATIM_USER_AGENT}

      # Backup
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY}
      BACKUP_IV: ${BACKUP_IV}
      BACKUP_RETENTION_DAYS: 30
      BACKUP_NOTIFY_EMAIL: ${BACKUP_NOTIFY_EMAIL}
      BACKUP_R2_PATH: backups/
    volumes:
      # Persist WhatsApp session agar tidak scan QR ulang setiap restart
      - wa_session:/app/backend/wa-session
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.attendenx-api.rule=Host(`api.${DOMAIN}`)'
      - 'traefik.http.routers.attendenx-api.entrypoints=websecure'
      - 'traefik.http.routers.attendenx-api.tls.certresolver=letsencrypt'
      - 'traefik.http.services.attendenx-api.loadbalancer.server.port=3001'
    networks:
      - attendenx_network
      - traefik_network  # Traefik network yang sudah ada di VPS

  # ── Web (Next.js) ─────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN}/api/v1
        NEXT_PUBLIC_SOCKET_URL: https://api.${DOMAIN}
    container_name: attendenx_web
    restart: always
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.${DOMAIN}/api/v1
      NEXT_PUBLIC_SOCKET_URL: https://api.${DOMAIN}
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.attendenx-web.rule=Host(`${DOMAIN}`)'
      - 'traefik.http.routers.attendenx-web.entrypoints=websecure'
      - 'traefik.http.routers.attendenx-web.tls.certresolver=letsencrypt'
      - 'traefik.http.services.attendenx-web.loadbalancer.server.port=3000'
    networks:
      - attendenx_network
      - traefik_network

volumes:
  postgres_data:
  redis_data:
  wa_session:

networks:
  attendenx_network:
    driver: bridge
  traefik_network:
    external: true  # Traefik sudah running, pakai network yang ada
    name: traefik_network

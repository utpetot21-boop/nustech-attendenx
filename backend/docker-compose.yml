version: '3.9'

services:
  # ── PostgreSQL 16 ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: attendenx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-attendenx}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-attendenx_pass}
      POSTGRES_DB: ${DB_NAME:-attendenx_db}
      POSTGRES_HOST_AUTH_METHOD: md5
      TZ: Asia/Makassar
      PGTZ: Asia/Makassar
    ports:
      - '${DB_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-attendenx} -d ${DB_NAME:-attendenx_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - attendenx_network

  # ── Redis 7 ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: attendenx_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - attendenx_network

  # ── pgAdmin (development only) ────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: attendenx_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nustech.id
      PGADMIN_DEFAULT_PASSWORD: pgadmin_pass
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev  # hanya aktif dengan: docker-compose --profile dev up
    networks:
      - attendenx_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  attendenx_network:
    driver: bridge
    name: attendenx_network
